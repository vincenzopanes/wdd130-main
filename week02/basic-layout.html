<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Vincenzo Panes">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="HTML Layout Logo" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://www.churchofjesuschrist.org/comeuntochrist">Come Unto Christ</a>
            </li><a href="https://www.byui.edu/">BYU Idaho</a>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure
            <section>
                <h2>Heading</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium,
                    necessitatibus.</p>
            </section>
            <section>
                <h2>Heading</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Dolorum, aperiam.</p>
            </section>
        </h1>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/concepcion-chile/2018/800x500/04-Concepcion-Chile-Temple-2114385.jpg"
          alt="Concepción, Chile Temple" width="200">
    </aside>
    <footer>
        <p>Vincenzo Panes</p>
    </footer>

</body>

</html>
