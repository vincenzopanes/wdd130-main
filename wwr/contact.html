<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiteWater Rafting - Contact Us</title>
    <meta name="description" content="Contact WhiteWater Rafting Company for 
    reservations, inquiries, and more information about our rafting trips.">
    <meta name="author" content="Vincenzo Panes Irribarra">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-oars.png" alt="WhiteWater Rafting Logo" width="120">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>Ruta de la Madera, 1780 <br>San Pedro de la Paz, Bio Bio <br>+56 9 69152257
                <br>whitewater.rafting@gmail.com
            </p>
        </section>
        <section class="contact-grid">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d2257.2480797192547!2d-73.07006272659983!3d-36.86090076150501!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2scl!4v1775884125563!5m2!1ses!2scl"
                  width="400" height="400" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" name="name" id="name" required placeholder="Your Name">

                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" required placeholder="Your Email">
                </div>
                <fieldset>
                    <legend>Message Purpose:</legend>

                    <label><input type="radio" name="purpose" value="general"> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website
                        Suggestion</label>
                </fieldset>


                <label for="message">Message:</label>
                <textarea name="message" id="message" required placeholder="Type here"></textarea>
                <!-- check button -->
                <input class="checkbox" type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                <!-- Get it touch bottom -->
                <button type="submit">Get in Touch</button>
            </form>
        </section>
        <section class="employees">
            <h2 class="section-title">We Are Here To Serve You</h2>
            <div class="employee-cards">
                <figure>
                    <img src="images/happy-employee1.jpg" alt="Pedro Rojas" width="150"
                      height="100">
                    <figcaption>Pedro Rojas – Trip Coordinator</figcaption>
                </figure>
                <figure>
                    <img src="images/happy-employee2.jpg" alt="María González" width="150"
                      height="150">
                    <figcaption>María González – Safety Instructor</figcaption>
                </figure>
                <figure>
                    <img src="images/happy-employee3.jpg" alt="Juan Pérez" width="150" height="100">
                    <figcaption>Juan Pérez – River Guide</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p> &copy; 2026 🛶 WhiteWater Rafting 🛶 Vincenzo Panes</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon" width="50">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon" width="50">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon" width="50">
            </a>
        </nav>
    </footer>
</body>

</html>
